# Build + deploy the Hugo site to GitHub Pages on every push to main.
# Adapted from the official Hugo template at
# https://gohugo.io/host-and-deploy/host-on-github-pages/.

name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between
# the run in-progress and latest queued. Don't cancel in-progress
# runs — we want them to finish before a new build replaces them.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Pin Hugo so site builds don't break when a new release ships
  # incompatible template changes. Bump deliberately, not by
  # surprise.
  HUGO_VERSION: 0.161.1
  # Same pinning rationale for the docs stack. mkdocs-material follows
  # rapid releases ; pin the major.minor we tested against.
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MkDocs + Material + Mike
        # mkdocs-material : the theme. Mike : versioned docs publisher.
        # We pin mike even though we don't run it yet — once the first
        # release lands we swap `mkdocs build` for `mike deploy <ver> latest`
        # and the version is already a known quantity.
        run: |
          pip install --upgrade pip
          pip install \
            mkdocs==1.6.1 \
            mkdocs-material==9.5.49 \
            mike==2.1.3 \
            pymdown-extensions==10.12

      - name: Build Hugo landing
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        # baseURL comes from hugo.toml — it's the single source of
        # truth. We deliberately don't pass --baseURL from
        # configure-pages.outputs.base_url because that field can lag
        # the actual repo URL (e.g. just after a repo rename), which
        # bakes a wrong /<old-name>/ prefix into every asset link.
        run: |
          hugo \
            --gc \
            --minify

      - name: Build MkDocs into public/docs/latest
        # site_dir in mkdocs.yml points at public/docs/latest, so this
        # nests the docs build inside the Hugo output — single artifact,
        # single deploy. When releases start landing, swap this for
        # `mike deploy --branch=<branch> <version> latest` and copy the
        # branch into public/docs/.
        run: |
          mkdocs build --strict

      - name: Write /docs/ redirect to /docs/latest/
        run: |
          mkdir -p public/docs
          cat > public/docs/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Weft documentation</title>
            <link rel="canonical" href="https://openweft.github.io/docs/latest/">
            <meta http-equiv="refresh" content="0; url=./latest/">
          </head>
          <body>
            <p>Redirecting to <a href="./latest/">/docs/latest/</a>…</p>
          </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
