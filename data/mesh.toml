# Mesh visualisation data — read by layouts/partials/mesh.html.
#
# Materialises the AZ → Rack → Host → microVM hierarchy :
#
#   - Three DC containers (DC1 / DC2 / DC3), dashed outline.
#   - Each DC holds two Rack containers (solid outline).
#   - Each Rack holds two physical hosts (small node circles).
#   - Each host runs two microVMs.
#
# The Weft daemon itself runs as just another HA microVM
# (`weft-1/2/3`, one per DC) — there is no separate "control
# plane box" floating above the racks. All platform services
# (etcd, nats, dex, zot, coredns, weft) are co-located on the
# same physical hosts as tenant workloads, isolated only by
# microVM boundaries.
#
# Spheres encode :
#   - Cross-DC infra traffic along the top microVM row
#   - Intra-DC weft-daemon dispatch to other microVMs
#   - Cross-DC tenant traffic along the bottom row
#   - The long diagonal showing the mesh is any-to-any
#
# Plane labels (CP / DP) are conceptual — colour distinguishes
# the two populations more strictly than y-position does
# (indigo = infra/CP, sky-blue = tenant/DP).

# =========================================================
# Plane swimlane labels — rendered in the left margin of the
# SVG. Text is rotated -90° (read bottom-to-top) by the partial.
# Placed at vertical extremes to avoid overlap with each other.
# =========================================================

[[planes]]
x = -50
y = 200
label = "Control plane"

[[planes]]
x = -50
y = 480
label = "Data plane"

