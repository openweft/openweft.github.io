# =========================================================
# Mesh-network edges — WireGuard overlay connecting microVMs
# across DCs. `kind = "mesh"` swaps the solid line for a
# dashed sky-blue stroke so the eye reads them as "logical
# overlay" rather than "physical link".
# =========================================================

# Top-row microvm chain DC1 → DC2 → DC3 (infra-to-infra).
[[edges]]
x1 = 140
y1 = 320
x2 = 490
y2 = 320
kind = "mesh"
[[edges]]
x1 = 540
y1 = 320
x2 = 890
y2 = 320
kind = "mesh"

# Weft control-plane HA chain — explicit cross-DC links
# between the three weft daemons (highlighted as the CP
# quorum line, conceptually replacing the old floating
# triangle).
[[edges]]
x1 = 310
y1 = 320
x2 = 710
y2 = 320
kind = "mesh"
highlight = true
[[edges]]
x1 = 710
y1 = 320
x2 = 1110
y2 = 320
kind = "mesh"
highlight = true

# Bottom-row microvm chain DC1 → DC2 → DC3 (tenant-to-tenant
# via the mesh).
[[edges]]
x1 = 310
y1 = 438
x2 = 660
y2 = 438
kind = "mesh"
[[edges]]
x1 = 710
y1 = 438
x2 = 1060
y2 = 438
kind = "mesh"

# Long diagonal — DC1 top-right microvm reaches DC3 bottom-left.
# Shows the mesh is any-to-any, not just nearest-neighbour.
[[edges]]
x1 = 140
y1 = 320
x2 = 1060
y2 = 438
kind = "mesh"

# =========================================================
# Paths (moving spheres)
# =========================================================

# Weft daemon HA replication — spheres travel along the weft
# chain (weft-1 ↔ weft-2 ↔ weft-3). Replaces the old
# inter-CP triangle animation.
[[paths]]
d = "M 310 320 L 710 320 L 1110 320"
dur = "6s"
r = 5
fill = "var(--accent-3)"
[[paths]]
d = "M 1110 320 L 710 320 L 310 320"
dur = "7s"
begin = "1.4s"
r = 4
fill = "var(--accent-3)"

# Intra-DC weft dispatch — from weft-N to a microvm in the
# same DC. Conveys "the CP daemon schedules workloads onto
# local hosts". One path per DC.
[[paths]]
d = "M 310 320 L 260 438"
dur = "5s"
begin = "0.3s"
r = 4
fill = "var(--accent-2)"
[[paths]]
d = "M 710 320 L 660 438"
dur = "5.5s"
begin = "1s"
r = 4
fill = "var(--accent-2)"
[[paths]]
d = "M 1110 320 L 1060 438"
dur = "6s"
begin = "2s"
r = 4
fill = "var(--accent-2)"

# Cross-DC host traffic — the bottom row weaving across.
[[paths]]
d = "M 115 410 L 285 410 L 515 410 L 685 410 L 915 410 L 1085 410"
dur = "9s"
begin = "2.6s"
r = 4
fill = "var(--accent)"

# Mesh-network traffic — microVM ↔ microVM packets crossing
# the WireGuard fabric. Sky-blue (microvm colour) so the eye
# associates the sphere with its node kind.
[[paths]]
d = "M 140 320 L 490 320 L 540 320 L 890 320"
dur = "6.5s"
begin = "0.4s"
r = 4
fill = "var(--mesh-microvm-fill)"
[[paths]]
d = "M 140 320 L 1060 438"
dur = "5.5s"
begin = "1.8s"
r = 4
fill = "var(--mesh-microvm-fill)"
[[paths]]
d = "M 310 438 L 660 438 L 710 438 L 1060 438"
dur = "7s"
begin = "3.4s"
r = 4
fill = "var(--mesh-microvm-fill)"
