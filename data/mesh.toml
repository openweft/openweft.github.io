# =========================================================
# MicroVMs — 2 per host. Spread ±25 from the host's x so the
# infra service labels (etcd-1, nats-1, coredns-1, weft-1, …)
# don't overlap each other horizontally.
#
# Per-DC infra layout (6 platform services per DC, fully HA
# via cross-DC replication) :
#
#   Rack A  : etcd + nats + dex + zot                (4 infra)
#   Rack B  : coredns + weft + 2 tenants  (2 infra + 2 tenant)
#
# 24 microVMs total = 18 infra (6 services × 3 DCs) + 6 tenant.
# `weft-N` is the cloud-platform control-plane daemon itself,
# running in HA across DCs just like every other service.
# =========================================================

# --- DC1 — Rack 1A : etcd-1 + nats-1 (top host) ; dex-1 + zot-1 (bottom host). ---
