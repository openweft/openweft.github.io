baseURL = "https://openweft.github.io/"
defaultContentLanguage = "en"
title = "Weft"
enableRobotsTXT = true

# Single-page landing site: no tag/category taxonomy pages, no feeds.
disableKinds = ["taxonomy", "term", "rss", "sitemap"]

[params]
  description = "Self-hosted, pure-Go microVM cloud platform with TPM-attested node admission and WireGuard segmentation."
  tagline = "A microVM cloud platform, in one pure-Go binary."
  devise = "Without the weft, the warp is just parallel threads."
  subtitle = "Weft is a HashiCorp-style cloud platform: one CGO-free Go binary that is control plane, node agent, and CLI. It boots real microVMs over a cgo-free QEMU driver, admits nodes by TPM 2.0 attestation, and segments every workload with WireGuard. Self-hosted, open source."
  docsURL = "https://openweft.github.io/docs/"
  githubURL = "https://github.com/openweft"

  [[params.features]]
    icon = "🐹"
    title = "Pure Go, zero cgo"
    body = "Built with CGO_ENABLED=0 — one static binary that is control plane, node agent, and CLI. Trivial cross-compilation, no C toolchain, no shared-library drift."

  [[params.features]]
    icon = "📦"
    title = "microVMs, real isolation"
    body = "A cgo-free QEMU/TCG driver plus a darwin Virtualization.framework driver boot true VMs in milliseconds — hardware-grade isolation, container-grade ergonomics."

  [[params.features]]
    icon = "🔏"
    title = "Attested admission"
    body = "Nodes join only after a TPM 2.0 EK→AK→Quote handshake the control plane verifies. Each admitted node gets freshly minted WireGuard peer keys."

  [[params.features]]
    icon = "🧩"
    title = "Self-hosted & open"
    body = "etcd-backed KV state, gRPC API, HCL config. BSD-3-Clause, no SaaS, no lock-in, no telemetry. Runs on a laptop ; scales to a 3-DC cluster."

  [[params.features]]
    icon = "🕸️"
    title = "Multi-tenant, meshed"
    body = "Every resource is UUID-keyed and owned by a project and user. Each workload joins one flat WireGuard overlay mesh — peering across datacenters in a single address space, segmented by policy."

  [[params.features]]
    icon = "👥"
    title = "Delegated administration"
    body = "Hand each tenant to its own admins: scoped RBAC lets them manage their projects, members, images, and VMs — with no reach into other tenants or the cluster itself."

  [[params.components]]
    name = "weft"
    body = "The binary: control plane, node agent, and CLI in one. HashiCorp-style `weft agent` daemon + `weft <noun> <verb>` client RPCs."
    url = "https://github.com/openweft/weft"

  [[params.components]]
    name = "weft-proto"
    body = "The gRPC service definitions and generated Go stubs shared by the agent, CLI, web UI, and Terraform provider."
    url = "https://github.com/openweft/weft-proto"

  [[params.components]]
    name = "weft-microvm"
    body = "microVM runtime behind `weft microvm`: OCI rootfs over virtio-fs, booted on a shared init kernel — no per-VM boot ISO."
    url = "https://github.com/openweft/weft-microvm"

  [[params.components]]
    name = "weft-driver-qemu"
    body = "The CGO-free QEMU/TCG hypervisor driver (go-plugin). Boots real VMs with no C bindings on any host."
    url = "https://github.com/openweft/weft-driver-qemu"

  [[params.components]]
    name = "weft-network"
    body = "WireGuard segmentation: per-node peer minting, scoped routes, and the encrypted mesh that connects microVMs across DCs."
    url = "https://github.com/openweft/weft-network"

  [[params.components]]
    name = "weft-etcd"
    body = "The etcd-backed KV datastore for cluster state — control-plane source of truth for the production 3-DC topology."
    url = "https://github.com/openweft/weft-etcd"

  [[params.components]]
    name = "weft-hcl"
    body = "HCL configuration: declare clusters, hosts, images, and VMs ; `weft up` converges them in dependency order."
    url = "https://github.com/openweft/weft-hcl"

  [[params.components]]
    name = "terraform-provider-weft"
    body = "The Terraform provider: manage weft clusters, hosts, images, and microVMs as infrastructure-as-code over the same gRPC API."
    url = "https://github.com/openweft/terraform-provider-weft"

  [[params.components]]
    name = "weft-webui"
    body = "The web dashboard for the cluster — instances, images, and hosts — driven by the same gRPC API as the CLI."
    url = "https://github.com/openweft/weft-webui"
