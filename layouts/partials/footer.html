<footer class="site">
  <div class="container">
    <div class="footer-cols">
      <div class="footer-brand">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          {{ .Site.Params.brand }}
        </div>
        <p>{{ .Site.Params.description }}</p>
      </div>
      {{ range .Site.Params.footerColumns }}
        <div>
          <h5>{{ .title }}</h5>
          <ul>
            {{ range .links }}
              <li><a href="{{ .url }}">{{ .name }}</a></li>
            {{ end }}
          </ul>
        </div>
      {{ end }}
    </div>
    <div class="footer-bottom">
      <span class="small">© {{ now.Year }} {{ .Site.Params.brand }} — open source under the project's repositories.</span>
      <span class="small">Built with <a href="https://gohugo.io">Hugo</a>.</span>
    </div>
  </div>
</footer>
