# MkDocs site for openweft documentation.
#
# Output lands inside the Hugo build's public/ folder under
# /docs/latest/ — single artifact, single GitHub Pages deploy, same
# host as the landing page.
#
# Mike (https://github.com/jimporter/mike) lays out versioned docs
# as /docs/<version>/ with /docs/latest/ as a symlink. We adopt the
# URL shape without using Mike yet (no releases to version) ; the
# workflow runs plain `mkdocs build -d public/docs/latest`. When the
# first release lands, swap to `mike deploy <version> latest` and
# the external URLs don't change.

site_name: Weft
site_url: https://openweft.github.io/docs/latest/
site_description: Weft platform — operator and developer documentation.
site_author: openweft

repo_url: https://github.com/openweft/weft
repo_name: openweft/weft
edit_uri: blob/main/

# Source markdown lives at <repo>/docs ; build output lands at
# <repo>/public/docs/latest (the workflow passes -d, this stays
# for local previews via `mkdocs serve`).
docs_dir: docs
site_dir: public/docs/latest

theme:
  name: material
  language: en
  # Logo (mark A — trame sur chaîne) et favicon. Même SVG que la
  # landing Hugo, copié sous docs/assets/ pour que chaque version
  # Mike embarque son propre logo, indépendant de la landing.
  # Source canonique : openweft.github.io/static/logo/weft-A-weave.svg.
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    # Auto light/dark via prefers-color-scheme ; explicit toggle too.
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting started:
      - Single-host bring-up: getting-started/single-host.md
      - 3-DC bring-up: getting-started/three-dc.md
      - microVM quickstart: getting-started/microvm-quickstart.md
  - Architecture:
      - architecture/index.md
      - Control plane: architecture/control-plane.md
      - Data plane: architecture/data-plane.md
      - Storage: architecture/storage.md
  - Operations:
      - operations/index.md
      - Bring up a cluster: operations/bring-up.md
      - Infra services: operations/infra.md
  - Operator handbook:
      - operator-handbook/index.md
      - Reverse proxy: operator-handbook/proxy.md
      - Observability: operator-handbook/observability.md
      - Backup and restore: operator-handbook/backup-and-restore.md
      - HA and DR: operator-handbook/ha-and-dr.md
      - Security: operator-handbook/security.md
  - CLI:
      - cli/index.md
      - weft agent: cli/agent.md
      - weft microvm: cli/microvm.md
  - Reference:
      - Terraform provider: reference/terraform-provider.md
      - CI runners: reference/runners.md
      - CLI surface: reference/cli.md
      - API: reference/api.md
  - API:
      - api/index.md
  - Contributing:
      - Coding conventions: contributing/coding-conventions.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/openweft
