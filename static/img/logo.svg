<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="openweft">
  <defs>
    <linearGradient id="weftgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#172445"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#weftgrad)"/>
  <!-- canonical weft mark A (warp/weft weave), inverted white-on-blue.
       Draw order warp[1,3] -> weft -> warp[2] gives the over/under. -->
  <g fill="none" stroke-linecap="round" stroke-width="22">
    <line x1="68"  y1="40" x2="68"  y2="216" stroke="#FFFFFF"/>
    <line x1="188" y1="40" x2="188" y2="216" stroke="#FFFFFF"/>
    <line x1="36"  y1="128" x2="220" y2="128" stroke="#CCD6EC"/>
    <line x1="128" y1="40" x2="128" y2="216" stroke="#FFFFFF"/>
  </g>
</svg>
