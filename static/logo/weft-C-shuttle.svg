<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Weft logo C — weaving shuttle laying thread">
  <title>Weft logo C — weaving shuttle laying thread</title>
  <!--
    Direction C : la navette (shuttle) qui dépose le fil de trame.
    Capsule lenticulaire pointée aux deux bouts (la navette en bois) +
    un fil qui sort à l'arrière en S — la trace de tissage. Métaphore
    "throughput / orchestration" plutôt que le tissu fini.
  -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- navette : lentille pointue, remplissage solide -->
    <path
      d="M40 128 Q 128 64 216 128 Q 128 192 40 128 Z"
      fill="#172445"/>
    <!-- bande centrale, identifie la 'canette' à l'intérieur -->
    <ellipse cx="128" cy="128" rx="34" ry="12" fill="#2563eb"/>
    <!-- fil de trame qui sort à droite, sinusoïde courte -->
    <path
      d="M216 128 q 8 -22 22 -22 q 14 0 14 22"
      stroke="#2563eb" stroke-width="10"/>
    <!-- léger trait de mouvement à gauche (fil déjà déposé) -->
    <path
      d="M4 128 q 14 -22 28 -22"
      stroke="#43548a" stroke-width="8" opacity="0.7"/>
  </g>
</svg>
