<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Weft — a modern Go-native cloud platform">
  <title>Weft — GitHub Social Preview card</title>
  <!--
    GitHub Social Preview spec : 1280×640 (1280×640 minimum, displayed
    1.91:1). This card is uploadable as-is via Settings → Social
    preview on each openweft/* repo so X / Slack / Mastodon scrapers
    surface a branded thumbnail when the repo is shared.

    Layout : lockup centered on a white canvas, generous safe-area so
    the crop at 1.91:1 keeps the brand visible even on platforms that
    re-frame the image. Lockup proportions identical to the
    weft-lockup-vertical.svg source : icon 160×160, wordmark + tagline
    below, vertically centered in the canvas.
  -->
  <rect width="1280" height="640" fill="#ffffff"/>

  <!-- Lockup group — viewBox of the source is 480×360 ; we scale it
       to 800×600 (preserves the 4:3 aspect) and center on the
       1280×640 canvas : (1280-800)/2 = 240 left, (640-600)/2 = 20 top. -->
  <g transform="translate(240, 20) scale(1.666666)">
    <!-- Icône centrée, 160×160 — reproduced verbatim from weft-lockup-vertical.svg -->
    <g transform="translate(160,16) scale(0.625)">
      <line x1="68"  y1="40" x2="68"  y2="216" stroke="#172445" stroke-width="22" stroke-linecap="round"/>
      <line x1="188" y1="40" x2="188" y2="216" stroke="#172445" stroke-width="22" stroke-linecap="round"/>
      <line x1="36"  y1="128" x2="220" y2="128" stroke="#2563eb" stroke-width="22" stroke-linecap="round"/>
      <line x1="128" y1="40" x2="128" y2="216" stroke="#172445" stroke-width="22" stroke-linecap="round"/>
    </g>
    <text x="240" y="260" text-anchor="middle"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="80" font-weight="700" letter-spacing="-2"
          fill="#172445">Weft</text>
    <text x="240" y="304" text-anchor="middle"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="20" font-weight="500" letter-spacing="0.5"
          fill="#43548a">a modern Go-native cloud platform</text>
  </g>
</svg>
